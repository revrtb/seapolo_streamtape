<style>
    label, input {
    display: inline-block;
    vertical-align: baseline;
    width: 120px;
}

.notify_email {
  position: fixed;
  left: 0px;
  top: 0px;
  width: 100%;
  height: 100%;
  z-index: 9999;
  background: url({{ url_for('static', filename='images/loadinggraphic.gif') }}) center no-repeat #fff;
  opacity: .6
}

label {
    color: #2D2D2D;
    font-size: 15px;
}

form, input {
    box-sizing: border-box;
    -moz-box-sizing: border-box;
    -webkit-box-sizing: border-box;
}

form {
    width: 330px;
}
</style>

</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <a href="{{ url_for('dashboardLogout') }}" type="button" class="btn btn-danger pull-right" title="Add new publisher!">Logout</a>
            <h2 >Links({{ count }})</h2>
        </div>
    </div>
    <div class="container-fluid">

        <div class="row">
            <button id="newPub" type="button" class="btn btn-success" title="Add new link!">New</button>
        </div>

        <div class="row">
            <div class="col-1">
            </div>
            <table class="table table-hover" id="ptable">
                <thead>
                    <tr>
                    <th>No</th>
                    {% for col in fields %}
                        <th>{{ col }}</th>
                    {% endfor %}
                    <th>edit</th>
                    <th>delete</th>
                    </tr>
                </thead>
                <tbody>
                {% for key in links %}
                    <tr id="{{ key }}" class="dataRow" url="{{ links[key][3] }}" network="{{ links[key][1] }}"  publisher="{{ links[key][2] }}" domain="{{ links[key][0] }}" obf_code="{{ links[key][4] }}">
                        <td> {{loop.length - loop.index + 1}} </td>
                        <td>{{ key }}</td>
                        <td>{{ links[key][3] }}</td>
                        <td>{{ links[key][1] }}</td>
                        <td>{{ links[key][2] }}</td>
                        <td>{{ links[key][0] }}</td>
                        <td><button class="btn btn-small btn-danger editItem">Edit</button></td>
                        <td><button class="btn btn-small btn-danger delItem">X</button></td>
                    </tr>
                {% endfor %}               
                </tbody>
            </table>
        </div>
    </div>

<!-- Modal1 -->
<div id="editModal" class="modal fade" role="dialog">
  <div class="modal-dialog">

    <!-- Modal content-->
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" data-dismiss="modal">&times;</button>
        <h4 id="headerText" class="modal-title"></h4>
      </div>
      <div class="modal-body">


        <form class="form-inline">
          <label for="cid">Code:</label> <input type="text" id="cid" name="cid" value="" class="form-control" disabled>
          <label for="url">URL: </label><input type="text" id="url" name="url" value="" class="form-control">
          <label for="network">Network: </label><input type="text" id="network" name="network" value="" class="form-control">
          <label for="publisher">Publisher: </label><input type="text" id="publisher" name="publisher" value="" class="form-control">
          <label for="domain">Domain: </label><input type="text" id="domain" name="domain" value="" class="form-control">
          <input type="text" id="id" name="id" value="" class="form-control" style="display:none">
          <!-- <input type="text" id="domain-dialog" name="domain-dialog" value="{{domain}}" style="display:none"> -->
          <!-- rest of form -->
        </form>
      </div>
      <div class="modal-footer">
        <button id="saveBtn" type="button" class="btn btn-success" data-dismiss="modal">Save</button>
        <button id="editBtn" type="button" class="btn btn-success" data-dismiss="modal">Save</button>
        <button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
